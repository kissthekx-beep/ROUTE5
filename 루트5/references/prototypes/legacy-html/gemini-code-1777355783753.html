<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROOT - 루터</title>
    <style>
        :root {
            --bg-silver: #E2E2E2;
            --neon-pink: #FF3366;
            --acid-green: #CCFF00;
            --dark-void: #1A1A1A;
            --white: #FFFFFF;
            --gray-text: #666;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        .app-container {
            width: 100%; max-width: 420px; height: 100vh;
            background-color: var(--bg-silver); position: relative;
            overflow: hidden; border: 2px solid var(--dark-void);
            display: flex; flex-direction: column;
        }

        /* 고정 상단 바 */
        .global-header {
            padding: 20px 20px 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-silver); z-index: 10;
        }
        .user-badge { font-weight: 900; font-size: 1.1rem; color: var(--dark-void); border-bottom: 3px solid var(--neon-pink); }
        .coin-box { background: var(--white); border: 2px solid var(--dark-void); padding: 4px 12px; border-radius: 20px; font-weight: 900; font-size: 0.85rem; box-shadow: 2px 2px 0px var(--dark-void); }

        .screen { position: absolute; top: 60px; left: 0; width: 100%; height: calc(100% - 60px); display: none; flex-direction: column; padding: 20px; }
        .screen.active { display: flex; }

        .scroll-section { overflow-y: auto; flex-grow: 1; padding-bottom: 150px; }

        /* 입력 그룹 */
        .input-group { margin-bottom: 18px; background: rgba(255,255,255,0.4); padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); }
        .input-label { font-size: 0.8rem; font-weight: 900; color: var(--dark-void); margin-bottom: 8px; display: block; border-left: 4px solid var(--neon-pink); padding-left: 8px; }
        .option-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
        .opt-btn { background: var(--white); border: 2px solid var(--dark-void); padding: 8px 14px; border-radius: 10px; font-weight: 700; font-size: 0.85rem; cursor: pointer; }
        .opt-btn.active { background: var(--acid-green); transform: translateY(-2px); box-shadow: 2px 2px 0px var(--dark-void); }

        /* 비용 슬라이더 */
        .price-slider { width: 100%; height: 10px; background: white; border: 2px solid var(--dark-void); border-radius: 5px; outline: none; -webkit-appearance: none; margin: 10px 0; }
        .price-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: var(--neon-pink); border: 2px solid var(--dark-void); border-radius: 50%; cursor: pointer; }

        /* 카드 디자인 */
        .place-item { background: var(--white); border: 2px solid var(--dark-void); border-radius: 18px; padding: 15px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; position: relative; }
        .place-main { display: flex; align-items: center; gap: 10px; }
        .time-tag { background: var(--dark-void); color: white; font-size: 0.7rem; padding: 3px 8px; border-radius: 5px; font-weight: 800; }
        .place-name { font-weight: 900; font-size: 1rem; color: var(--dark-void); }
        
        .info-group { display: flex; gap: 5px; margin-top: 5px; }
        .info-btn { flex: 1; background: #f0f0f0; border: 1px solid var(--dark-void); padding: 6px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; text-align: center; cursor: pointer; text-decoration: none; color: black; }

        /* 노선도 UI */
        .metro-line { width: 90%; height: 4px; background: var(--dark-void); display: flex; justify-content: space-between; align-items: center; margin: 30px auto 10px auto; position: relative; }
        .metro-station { width: 12px; height: 12px; background: var(--white); border: 3px solid var(--neon-pink); border-radius: 50%; position: relative; }
        .station-name { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); font-size: 0.65rem; font-weight: 900; white-space: nowrap; }

        /* 체크리스트 */
        .check-box { width: 22px; height: 22px; border: 2px solid var(--dark-void); border-radius: 6px; flex-shrink: 0; background: white; }
        .done .place-name { text-decoration: line-through; opacity: 0.5; }
        .done .check-box { background: var(--acid-green); display: flex; align-items: center; justify-content: center; }
        .done .check-box::after { content: '✓'; font-weight: 900; }

        /* 하단 내비게이션 */
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: var(--bg-silver); border-top: 2px solid var(--dark-void); display: flex; flex-direction: column; gap: 10px; align-items: center; z-index: 10; }
        .main-btn { background: var(--dark-void); color: var(--acid-green); border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 1.1rem; font-weight: 900; cursor: pointer; box-shadow: 0 4px 0px rgba(0,0,0,0.2); }
        .pass-btn { background: none; border: none; text-decoration: underline; font-weight: 900; font-size: 0.9rem; color: var(--gray-text); cursor: pointer; }

        /* 레벨업 팝업 */
        .lv-popup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: var(--acid-green); border: 4px solid var(--dark-void); padding: 30px; border-radius: 30px; z-index: 1000; text-align: center; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .lv-popup.active { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="lv-up-card" class="lv-popup">
            <h1 style="font-size: 3rem;">🏅</h1>
            <h2 style="font-weight: 900; margin: 10px 0;">LEVEL UP!</h2>
            <p style="font-weight: 800;">성실한 루터군요!<br>경험치가 상승했습니다.</p>
            <button class="main-btn" style="margin-top:20px; padding:10px;" onclick="closeLvUp()">확인</button>
        </div>

        <div class="global-header">
            <div id="user-lv" class="user-badge">LV.01</div>
            <div class="coin-box" id="coin-display">🪙 500</div>
        </div>

        <div id="screen-home" class="screen active">
            <div class="scroll-section">
                <div class="input-group">
                    <span class="input-label">Q0. 몇 군데 가고 싶어?</span>
                    <div class="option-wrap">
                        <button class="opt-btn" onclick="setCount(3, this)">3개 루트</button>
                        <button class="opt-btn active" onclick="setCount(5, this)">5개 루트</button>
                    </div>
                </div>
                <div class="input-group">
                    <span class="input-label">Q1. 오늘 기분 어때?</span>
                    <div class="option-wrap">
                        <button class="opt-btn" onclick="setVal(this)">행복</button>
                        <button class="opt-btn" onclick="setVal(this)">설렘</button>
                        <button class="opt-btn active" onclick="setVal(this)">싱숭생숭</button>
                    </div>
                </div>
                <div class="input-group">
                    <span class="input-label">Q2. 누구랑 있어?</span>
                    <div class="option-wrap">
                        <button class="opt-btn active" onclick="setVal(this)">혼자</button>
                        <button class="opt-btn" onclick="setVal(this)">친구</button>
                    </div>
                </div>
                <div class="input-group">
                    <span class="input-label">Q3. 반경 (내 위치 기준)</span>
                    <div class="option-wrap">
                        <button class="opt-btn active" onclick="setVal(this)">가까움</button>
                        <button class="opt-btn" onclick="setVal(this)">멀리</button>
                    </div>
                </div>
                <div class="input-group">
                    <span class="input-label">Q4. 예상 비용</span>
                    <input type="range" class="price-slider" min="10000" max="100000" step="5000" value="20000" oninput="changePrice(this.value)">
                    <div id="price-txt" style="background:white; padding:10px; border-radius:10px; border:2px solid var(--dark-void); font-weight:900; color:var(--neon-pink); text-align:center;">
                        20,000원
                    </div>
                </div>
                <div class="input-group">
                    <span class="input-label">Q5. 교통수단</span>
                    <div class="option-wrap">
                        <button class="opt-btn active" onclick="setVal(this)">도보</button>
                        <button class="opt-btn" onclick="setVal(this)">자동차</button>
                    </div>
                </div>
            </div>
            <div class="bottom-nav"><button class="main-btn" onclick="startRoute()">루터야, 루트 부탁해!</button></div>
        </div>

        <div id="screen-result" class="screen">
            <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:15px;">
                <div id="step-badge" style="background:var(--acid-green); padding:5px 18px; border-radius:20px; border:2px solid var(--dark-void); font-weight:900; margin-bottom:10px;">1 / 5</div>
                <h2 id="res-title" style="text-align:center; font-size:1rem; width:100%; background:white; padding:12px; border:2px solid var(--dark-void); border-radius:10px; font-weight:900;"></h2>
            </div>
            <div class="scroll-section">
                <div id="places-container"></div>
                <div class="metro-line" id="metro-ui"></div>
            </div>
            <div class="bottom-nav">
                <button class="pass-btn" onclick="nextCourse()">이 계획은 패스할래 ➔</button>
                <button class="main-btn" onclick="confirmRoute()">이 루트로 시작하기!</button>
                <button class="pass-btn" style="text-decoration:none;" onclick="showScreen('home')">처음으로 돌아가기</button>
            </div>
        </div>

        <div id="screen-myplan" class="screen">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div style="font-weight:900; font-size:1.2rem;">MY PLAN ✅</div>
                <div id="progress-text" style="font-weight:900; color:var(--neon-pink);">0%</div>
            </div>
            <div class="scroll-section">
                <div id="my-plan-list"></div>
                <button class="opt-btn" style="width:100%; border-style:dashed; margin-top:15px;" onclick="showScreen('home')">+ 새로운 루트 만들기</button>
            </div>
            <div class="bottom-nav"><button class="main-btn" onclick="finishDay()">오늘 하루 마무리</button></div>
        </div>
    </div>

    <script>
        let currentIdx = 0;
        let selectedCount = 5;
        let myConfirmedPlan = [];
        let userLv = 1;
        let userCoin = 500;

        const allCourseSets = [
            { title: "약수 감성 아카이브", spots: ["릴리브", "하늘이네", "장충단공원", "리사르", "금돼지식당"], desc: "예술적 영감을 주는 코스" },
            { title: "성수 미디어 투어", spots: ["무신사테라스", "성수감자탕", "서울숲", "대림창고", "먼치스"], desc: "힙한 감성의 미디어 코스" },
            { title: "서촌 기록 투어", spots: ["그라운드시소", "영화루", "수성동계곡", "대충유원지", "계단집"], desc: "고즈넉한 골목 기록 코스" }
        ];

        function changePrice(v) {
            document.getElementById('price-txt').innerText = Number(v).toLocaleString() + "원";
        }

        function setVal(btn) {
            btn.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function setCount(n, btn) {
            selectedCount = n;
            setVal(btn);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }

        function startRoute() {
            showScreen('result');
            renderResult();
        }

        // 지도 및 리뷰 연결 함수
        function openMap(name) { window.open(`https://m.map.naver.com/search2/search.naver?query=${encodeURIComponent(name)}`, '_blank'); }
        function openReview(name) { window.open(`https://m.search.naver.com/search.naver?query=${encodeURIComponent(name + ' 리뷰')}`, '_blank'); }

        function renderResult() {
            const course = allCourseSets[currentIdx];
            const activeSpots = course.spots.slice(0, selectedCount);
            document.getElementById('res-title').innerText = course.title;
            document.getElementById('step-badge').innerText = `${currentIdx + 1} / 5`;
            
            let html = '';
            let metro = '';
            activeSpots.forEach((s, i) => {
                html += `
                <div class="place-item">
                    <div class="place-main">
                        <div class="time-tag">${12+i}:00</div>
                        <div class="place-name">${s}</div>
                    </div>
                    <div class="info-group">
                        <div class="info-btn" onclick="openMap('${s}')">📍 위치</div>
                        <div class="info-btn" onclick="openReview('${s}')">⭐ 리뷰</div>
                    </div>
                </div>`;
                metro += `<div class="metro-station"><div class="station-name">${s.slice(0,2)}</div></div>`;
            });
            document.getElementById('places-container').innerHTML = html;
            document.getElementById('metro-ui').innerHTML = metro;
        }

        function nextCourse() {
            currentIdx = (currentIdx + 1) % allCourseSets.length;
            renderResult();
        }

        function confirmRoute() {
            const course = allCourseSets[currentIdx];
            myConfirmedPlan = course.spots.slice(0, selectedCount).map(s => ({name: s, done: false}));
            renderMyPlan();
            showScreen('myplan');
        }

        function renderMyPlan() {
            let html = '';
            myConfirmedPlan.forEach((item, i) => {
                html += `
                <div class="place-item ${item.done ? 'done' : ''}" onclick="toggleDone(${i})" style="flex-direction:row; align-items:center; gap:15px; cursor:pointer;">
                    <div class="check-box"></div>
                    <div class="place-name" style="font-size:1.1rem;">${item.name}</div>
                </div>`;
            });
            document.getElementById('my-plan-list').innerHTML = html;
            updateProgress();
        }

        function toggleDone(i) {
            myConfirmedPlan[i].done = !myConfirmedPlan[i].done;
            renderMyPlan();
        }

        function updateProgress() {
            const doneCount = myConfirmedPlan.filter(p => p.done).length;
            const percent = myConfirmedPlan.length > 0 ? Math.round((doneCount / myConfirmedPlan.length) * 100) : 0;
            document.getElementById('progress-text').innerText = percent + "%";
        }

        function finishDay() {
            const isComplete = myConfirmedPlan.length > 0 && myConfirmedPlan.every(p => p.done);
            if (isComplete) {
                userLv++;
                userCoin += 200;
                // 상단 레벨 즉시 업데이트
                document.getElementById('user-lv').innerText = "LV." + String(userLv).padStart(2, '0');
                document.getElementById('coin-display').innerText = "🪙 " + userCoin;
                document.getElementById('lv-up-card').classList.add('active');
            } else {
                alert("아직 완료하지 않은 루트가 있습니다!");
            }
        }

        function closeLvUp() {
            document.getElementById('lv-up-card').classList.remove('active');
            showScreen('home');
        }
    </script>
</body>
</html>
